<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Image Editor | Fast, Private & Browser-based</title>
    <meta name="description" content="Edit, crop, and filter images directly in your browser. No upload required, 100% private and fast using Canvas API.">
    <meta name="keywords" content="image editor, photo editor, online image cutter, browser image editor, canvas api, private image editing, no upload image editor">
    <meta name="author" content="JKH-ML">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jkh-ml.github.io/image-editor/">
    <meta property="og:title" content="Online Image Editor | Fast & Private">
    <meta property="og:description" content="Edit and filter images in seconds without uploading to any server.">
    <meta property="og:image" content="https://jkh-ml.github.io/image-editor/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Online Image Editor">
    <meta property="twitter:description" content="Fast, browser-based image editor using Canvas API.">

    <script src="coi-serviceworker.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="i18n.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <a href="index.html" class="btn-home" title="Home">🏠</a>
                    <h1 data-i18n="title">Image Editor</h1>
                </div>
                <div class="header-right">
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">🌓</button>
                    <select id="lang-selector" class="lang-selector">
                        <option value="ko">한국어</option>
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active" data-i18n="filter">Filter</a>
                <a href="bg-remove.html" class="nav-link" data-i18n="bg_remove">Background Removal</a>
                <a href="crop.html" class="nav-link" data-i18n="crop">Crop</a>
                <a href="merge.html" class="nav-link" data-i18n="merge">Merge</a>
                <a href="collage.html" class="nav-link" data-i18n="collage">Collage</a>
                <a href="gif.html" class="nav-link" data-i18n="gif">GIF Maker</a>
            </nav>
            <div id="status" class="status-badge" data-i18n="status_ready">Ready</div>
        </header>
        
        <main>
            <section class="upload-area" id="drop-zone">
                <input type="file" id="uploader" accept="image/*" class="hidden">
                <div class="upload-content">
                    <span class="upload-icon">↑</span>
                    <p class="upload-label" data-i18n="upload_label_img">Click or drag to upload image</p>
                </div>
            </section>

            <section id="editor-container" class="editor-main hidden">
                <!-- Preview Card -->
                <div class="card image-preview-card">
                    <div class="card-content">
                        <div class="image-wrapper">
                            <canvas id="main-canvas"></canvas>
                        </div>
                    </div>
                </div>

                <div class="controls-grid">
                    <!-- Filters Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title" data-i18n="filters_title">Filters & Adjust</h3>
                        </div>
                        <div class="card-content">
                            <div class="filter-controls">
                                <div class="input-box">
                                    <label data-i18n="brightness">Brightness</label>
                                    <input type="range" id="brightness" min="0" max="200" value="100">
                                </div>
                                <div class="input-box">
                                    <label data-i18n="contrast">Contrast</label>
                                    <input type="range" id="contrast" min="0" max="200" value="100">
                                </div>
                                <div class="input-box">
                                    <label data-i18n="saturation">Saturation</label>
                                    <input type="range" id="saturation" min="0" max="200" value="100">
                                </div>
                                <div class="input-box">
                                    <label data-i18n="blur">Blur</label>
                                    <input type="range" id="blur" min="0" max="20" value="0">
                                </div>
                            </div>
                            <div class="button-group">
                                <button id="reset-filters" class="btn-outline" data-i18n="reset">Reset</button>
                            </div>
                        </div>
                    </div>

                    <!-- Transform Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title" data-i18n="transform_title">Transform</h3>
                        </div>
                        <div class="card-content">
                            <div class="btn-group-grid">
                                <button id="rotate-btn" class="btn-outline" data-i18n="rotate_btn">Rotate (90°)</button>
                                <button id="flip-h-btn" class="btn-outline" data-i18n="flip_h_btn">Flip Horizontal</button>
                                <button id="flip-v-btn" class="btn-outline" data-i18n="flip_v_btn">Flip Vertical</button>
                            </div>
                        </div>
                    </div>

                    <!-- Actions Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title" data-i18n="actions_title">Actions</h3>
                        </div>
                        <div class="card-content action-card-content">
                            <div class="setting-row" style="flex-direction: column; align-items: flex-start;">
                                <span class="setting-label" data-i18n="format_label">Export Format</span>
                                <div class="radio-group">
                                    <label class="radio-item"><input type="radio" name="format" value="png" checked> PNG</label>
                                    <label class="radio-item"><input type="radio" name="format" value="jpeg"> JPG</label>
                                    <label class="radio-item"><input type="radio" name="format" value="webp"> WebP</label>
                                </div>
                            </div>
                            <button id="export-btn" class="btn-primary btn-full" data-i18n="export_img_btn">Export Image</button>
                        </div>
                    </div>
                </div>

                <!-- Download -->
                <div id="download-container" class="download-section hidden">
                    <a id="download-link" href="#" download="edited.png" class="btn-download" data-i18n="download_btn">Download Result</a>
                </div>
            </section>

        </main>
        <footer>
            <a href="https://github.com/JKH-ML/image-editor" target="_blank" class="btn-repo">
                <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                <span data-i18n="repo">GitHub Repository</span>
            </a>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
